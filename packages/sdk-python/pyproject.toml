[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentbeam"
version = "0.2.0"
description = "Monitor, debug, and manage the cost of AI agents in production"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = [
    "requests>=2.28.0",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.20.0"]
openai = ["openai>=1.0.0"]
all = ["anthropic>=0.20.0", "openai>=1.0.0"]

[tool.setuptools.packages.find]
include = ["agentbeam*"]
